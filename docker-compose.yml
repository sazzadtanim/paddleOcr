version: "3.8"
services:
  paddleocr:
    build: .
    container_name: paddleocr-api
    environment:
      - TZ=Asia/Dhaka
      - MODEL_DIR=/models
    expose:
      - "8000"
    volumes:
      - paddleocr_models:/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - dokploy-network
volumes:
  paddleocr_models:
networks:
  dokploy-network:
    external: true
